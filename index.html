<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio Responsivo</title>
    <link rel="stylesheet" href="stylos.css">
</head>
<body>
    <header>
        <h1>Mi sitio web</h1>
    </header>
    <nav class="menu">
        <div>Inicio</div>
        <div>Servicios</div>
        <div>Productos</div>
        <div>Contacto</div>
    </nav>
    <main class="contenedor">
        <section class="contenido">
            <h2>Contenido principal</h2>
            <p>Este es un ejemplo de diseño responsivo.</p>
            <div class="tarjetas">
                <div class="card">Tarjeta 1</div>
                <div class="card">Tarjeta 2</div>
                <div class="card">Tarjeta 3</div>
            </div>
        </section>
        <aside class="sidebar">
            <h3>Barra lateral</h3>
            <p>Información adicional</p>
        </aside>
    </main>
    <footer>
        <p>© 2026 - Sitio responsivo</p>
    </footer>
</body>
</html>
